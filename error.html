<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>503 Service Unavailable</title>

<style>
body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:#f5f5f5;
    color:#333;
}

.container{
    max-width:700px;
    margin:120px auto;
    padding:40px;
   
}

h1{
    font-size:42px;
    margin-bottom:10px;
    color:#222;
}

.code{
    color:#888;
    font-size:18px;
    margin-bottom:30px;
}

p{
    line-height:1.8;
    font-size:16px;
}

.notice{
    margin-top:25px;
    padding:15px 20px;
    background:#fafafa;
    border-left:4px solid #999;
}

.footer{
    margin-top:40px;
    color:#777;
    font-size:14px;
}
</style>
</head>
<body>

<div class="container">

    <h1>503 Service Unavailable</h1>

    <div class="code">
        Error Code: 503
    </div>

    <p>
        The requested service is temporarily unavailable.
    </p>

    <div class="notice">
        This website may be temporarily suspended, undergoing maintenance,
        or experiencing a configuration issue.
    </div>

    <p>
        Please try again later.
    </p>


</div>

</body>
</html>
